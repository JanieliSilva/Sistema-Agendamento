# =============================================
# BANCO DE DADOS
# Nunca commite senhas! Use variáveis de ambiente:
# export DB_URL=jdbc:postgresql://localhost:5432/agendamento_db
# export DB_USER=postgres
# export DB_PASS=sua_senha
# =============================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/agendamento_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:troque_esta_senha}

# "update" mantém os dados entre restarts (não apaga o banco!)
# Use "create-drop" só para testes, nunca em produção
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=8081